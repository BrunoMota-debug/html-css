<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Imagem de Fundo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: linear-gradient(to bottom, aqua, greenyellow);

        }
        div.quadrado {
            width: 200px;
            height: 200px;
            border: 1px solid #000;
            border-radius: 5px;
            background-size: cover;
            background-position: center;
            background-color: grey;
            margin: 5px;
            display: inline-block;
            color: rgb(7, 7, 7);
            text-align: center;
            line-height: 100px;
            font-family: Arial, sans-serif;
        }
        #q1 {
            background-image: url('imgens/pattern001.png');
        }     #q2 {
            background-image: url('imgens/pattern002.png');
        }   #q3 {
            background-image: url('imgens/pattern003.png');
        }   
    </style>
</head>
<body>
    <div class="quadrado" id="q1">
        
    </div>
    <div class="quadrado" id="q2">
    </div>
    <div class="quadrado" id="q3">
    </div>
</body>
</html>
